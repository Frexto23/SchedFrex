#      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=schedule-db;Username=frexto;Password=1234
#    depends_on:
#      - postgres
  postgres:
    image: postgres:16
    container_name: schedfrex_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: frexto
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: schedule-db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
        
  pgadmin:
    image: dpage/pgadmin4
    container_name: schedfrex_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    depends_on:
      - postgres
    volumes:
      - ./pgadmin/servers.json:/pgadmin4/servers.json

volumes:
  pg_data: